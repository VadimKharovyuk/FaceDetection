spring.application.name=FaceDetection
server.port=${PORT:1117}
spring.profiles.active=local
# ============================================================
# DATABASE (PostgreSQL)
# ============================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/FaceDetection}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:19111993}

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# ONNX MODELS ? ???? ? ?????? ? resources/models/
# ============================================================
app.models.detection=classpath:models/det_10g.onnx
#app.models.recognition=classpath:models/w600k_r50.onnx
app.models.recognition=classpath:models/glintr100.onnx
app.models.genderage=classpath:models/genderage.onnx

app.face.similarity-threshold=0.45


# ============================================================
# FILE UPLOAD ? ???????? ???? ????? ?????
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# PGVECTOR ? ??????????? ???? vector ??? Hibernate
# ============================================================
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR


spring.mvc.hiddenmethod.filter.enabled=true